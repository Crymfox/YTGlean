name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to Crymfox/homebrew-tap and Crymfox/scoop-bucket
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

  publish-aur:
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "pkgver=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Patch PKGBUILD
        run: |
          sed -i "s/^pkgver=.*/pkgver=${{ steps.version.outputs.pkgver }}/" aur/ytglean-bin/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" aur/ytglean-bin/PKGBUILD

      - name: Generate .SRCINFO
        run: |
          docker run --rm -v "$PWD:/src" -w /src archlinux:latest bash -c "
            pacman -Sy --noconfirm base-devel &&
            useradd -m builder &&
            chown -R builder:builder /src &&
            su - builder -c 'cd /src/aur/ytglean-bin && makepkg --printsrcinfo > .SRCINFO'
          "

      - name: Publish ytglean-bin to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v2
        with:
          pkgname: ytglean-bin
          pkgbuild: aur/ytglean-bin/PKGBUILD
          assets: |
            aur/ytglean-bin/ytglean-bin.install
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_username: "Crymfox"
          commit_email: "sameur.bh@gmail.com"
