version: 2

project_name: ytglean

before:
  hooks:
    - go mod tidy

builds:
  - id: ytglean
    binary: ytglean
    main: .
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/CrymfoxLabs/YTGlean/cmd.Version={{.Version}}
      - -X github.com/CrymfoxLabs/YTGlean/cmd.CommitSHA={{.Commit}}
      - -X github.com/CrymfoxLabs/YTGlean/cmd.BuildDate={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
