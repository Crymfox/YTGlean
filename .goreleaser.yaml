version: 2

project_name: ytglean

before:
  hooks:
    - go mod tidy

builds:
  - id: ytglean
    binary: ytglean
    main: .
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/CrymfoxLabs/YTGlean/cmd.Version={{.Version}}
      - -X github.com/CrymfoxLabs/YTGlean/cmd.CommitSHA={{.Commit}}
      - -X github.com/CrymfoxLabs/YTGlean/cmd.BuildDate={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

homebrew_casks:
  - repository:
      owner: Crymfox
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Casks
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    homepage: "https://github.com/Crymfox/YTGlean"
    description: "Glean transcripts from YouTube channels, summarize via LLM, and serve them over MCP"
    # Binaries are cross-compiled and unsigned; strip the quarantine bit so
    # macOS Gatekeeper doesn't flag the CLI as "damaged".
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/ytglean"]
          end

scoops:
  - repository:
      owner: Crymfox
      name: scoop-bucket
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    homepage: "https://github.com/Crymfox/YTGlean"
    description: "Glean transcripts from YouTube channels, summarize via LLM, and serve them over MCP"
    license: "MIT"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
